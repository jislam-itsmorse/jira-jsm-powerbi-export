name: Jira JSM Export to SharePoint

on:
  schedule:
    - cron: "0 2 * * *"   # daily 02:00 UTC
  workflow_dispatch:

jobs:
  export-jira:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # This confirms the secret exists (does NOT print its value)
      - name: Debug required env
        run: |
          echo "SP_LIBRARY_RELATIVE_URL is set? -> ${{ secrets.SP_LIBRARY_RELATIVE_URL != '' }}"

      - name: Run export
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

          SP_SITE_URL: ${{ secrets.SP_SITE_URL }}
          SP_CLIENT_ID: ${{ secrets.SP_CLIENT_ID }}
          SP_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}

          # ✅ THIS IS THE ONE THAT FIXES YOUR KeyError
          SP_LIBRARY_RELATIVE_URL: ${{ secrets.SP_LIBRARY_RELATIVE_URL }}

          # Optional override (only add if you created this secret)
          # JIRA_JQL: ${{ secrets.JIRA_JQL }}

        run: |
          python export_jira.py
